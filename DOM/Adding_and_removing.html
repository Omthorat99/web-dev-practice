<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adding and removing</title>
</head>

<body>
    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
        <div class="box">Box 5</div>

    </div>

    <script>
        let box = document.createElement("div");
        box.innerText = "Box 6"
        box.setAttribute("class", "box");

        let container = document.querySelector(".container")
        container.append(box, " Om ", " harry ", "jorj")
        container.prepend(box)//Add box towards the begning

        // container.removeChild(box);//remove the box we have created later

    </script>
</body>

</html>
