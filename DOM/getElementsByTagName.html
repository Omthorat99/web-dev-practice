<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>getElementsByTagName</title>
</head>
<body>
    <div class="container">
    <div id="box1" class="box">Box 1 </div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
    <button onclick="magic()">Do the magic</button>
    </div>

    <script>
        function magic(){
            let divs = document.getElementsByTagName("div");
            // console.log(divs)
            for (element of divs){
                element.innerHTML = element.innerHTML + "<p>I am learn DOM</p>"
            }
        }
    </script>
</body>         
</html>
