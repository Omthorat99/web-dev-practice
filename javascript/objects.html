<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects</title>
    <script>
        console.log("JavaScript objects")
        let obj = {
            name: "om thorat",
            salary: 100000,
            language: "Javascript",
            isAdmin: false,
            "father name": "Eknath Thorat"
        }
        console.log(obj)


        let student = {
            name: "John",
            address: {
                city: "Mumbai",
                pin: 400001
            }
        };

        console.log(student.address.city);  // "Mumbai"


        let person = {
            name: "Alice",
            age: 30,
            isEmployed: true
        };
        console.log(person);

    </script>
    <style>
        * {
            background-color: bisque;
        }
    </style>
</head>

<body>
    <h1>This is using of objects in javascript if you want to see go to the console</h1>
</body>

</html>
