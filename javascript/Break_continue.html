<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break_continue</title>
    <script>
        for (let index = 0; index < 6; index++) {
          
            if(index==4){
                // break
                continue
            }
               console.log(index)
            
        }
    </script>
    <style>
        *{
            background-color: rgb(234, 233, 255);
        }
    </style>
</head>
<body>
    <h1>This page show the continue and break statement in the javascript in console</h1>
    
</body>
</html>
