<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operators</title>
    <script>
        let a = 45;
        let b = 2;
        console.log("Operators in javaScript")
        console.log("a X b = ", a * b)
        console.log("a + b = ", a + b)
        console.log("a - b = ", a - b)
        console.log("a % b = ", a % b)
        console.log("a / b = ", a / b)
        console.log("a ** b = ", a ** b)//exponent
        a += 2;
        console.log(a)


        let age = 17;
        let result = age >= 18 ? "Adult" : "Minor";
        console.log(result); 

    </script>
</head>

<body>
    Operators in javascript
</body>

</html>
