<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <title>Typography</title>
    <style>
        p {
            font-size: 20px;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-weight: bold;
            font-family: "Dancing Script", cursive;
            text-align: justify;
            line-height: 2;
            letter-spacing: 2px;
            word-spacing: 5px;

        }

        .upper {
            text-align: center;
            text-transform: uppercase;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <h1 class="upper">Typography</h1>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Praesentium molestiae mollitia nam fuga reprehenderit
        porro! Quod nemo, rerum, exercitationem quam ut aspernatur quo commodi dignissimos quis in, quas ipsa mollitia
        sint cum perspiciatis nisi.</p>

</body>

</html>
