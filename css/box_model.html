<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box model</title>
    <style>
        #div1 {
            height: 200px;
            width: 200px;
            padding: 20;
            background-color: yellow;  
            border: 2px solid black;
            margin: 40px;
        }

        .card {
            width: 400px;
            padding: 20px;
            border: 10px solid black;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div id="div1">this is the dev1</div>
    <div class="card">This is an using of div.card</div>

</body>

</html>
