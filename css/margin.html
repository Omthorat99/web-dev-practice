<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        h1 {
            border: 2px solid red;
            margin: 23px;
            /*margin	Outside the element*/
            background-color: aqua;
            padding: 25px;
            /*padding	-Inside the element	*/
        }

        p {
            border: 2px solid green;
            margin: 23px;
            background-color: bisque;
            padding: 20px;
        }
        .margin{
           /* margin: 0 auto;  */
           margin: 20px 40px 20px 40px;
        }
    </style>
</head>

<body>
    <h1 class="margin">Using of the margin 0 </h1>
    <h1>margin</h1>
    <p>This is the paragraph</p>
    <p>This is another para</p>
    <p>This is one another  para</p>
</body>

</html>
