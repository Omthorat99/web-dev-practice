<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
    <style>
        .container{
            width: 544px;
            height: 144px;
            border: 2px solid red;
        }
        .box{
            width: 150px;
            height: 54px;
            border: 2px solid blue;
            background-color: aquamarine;
            position: relative;
            top: 34px;
            left: 34px;
        }
    </style>
</head>
<body>
    <div class="container 1">
        <div class="box 1">
            I am box 1
        </div>
    </div>
</body>
</html>
