<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tables in the html</title>
</head>

<body>
    <h3>creating of table in html</h3>
    <table border="1" width="200" height="200">
        <tr>
            <th>sr.no</th>
            <th>Name</th>
            <th>AGE</th>
        </tr>
        <tr>
            <td>1</td>
            <td>OM</td>
            <td>18</td>
        </tr>
        <tr>
            <td>2</td>
            <td>sahil</td>
            <td>19</td>
        </tr>
        <tr>
            <td>3</td>
            <td>sita</td>
            <td>18</td>
        </tr>
    </table>

    <p>
    <h3>Now the below examples are of the rowspans and callspans</h3>
    <table border="1">
        <tr >
            <th colspan="4">SPECIAL TABLE</th>
        </tr>
        <tr>
            <th>sr.no</th>
            <th>User name</th>
            <th >Age</th>
            <th>Qualification</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Om</td>
            <td rowspan="3">18</td>
            <td>12th pass </td>
        </tr>
        <tr>
            <td>2</td>
            <td>Madhura</td>
            <!-- <td>18</td> -->
            <td>12th pass</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Harry</td>
            <!-- <td>18</td> -->
            <td>12th pass</td>
        </tr>
    </table>

    </p>
</body>

</html>
