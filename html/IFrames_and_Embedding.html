<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFrames and Embedding</title>
</head>

<body>
    <p>An &lt;iframe&gt; (inline frame) is used to embed another webpage or external content inside your HTML page.</p>
    <h3>This is the some examples of Embedding the website</h3>
    <iframe width="1000" height="500" src="https://www.codewithharry.com"></iframe><br>
    <P>This is website of wikipidia</P>
    <iframe src="https://www.wikipedia.org" width="1000" height="500"></iframe>
    <P>This is the example of youtube video</P>
    <iframe width="1000" height="500" src="https://www.youtube.com/embed/6ctaMJZkSDY?si=0LlOvX_MSGkRJ8cE"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>

</html>
