<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form in the html</title>
</head>

<body>
    <h1>FORM </h1><br><br>
    <h3>THE FORM FOR SUBMITTING PERSONAL INFORMATION</h3>
    <form>
        <label for="name">NAME</label>
        <input type="text" placeholder="enter your fullname here" id="name" name="name">
        <br><br>

        <label for="mob">MOBILE</label>
        <input type="tel" id="mob" name="MOBILE">
        <br><br>
        <label for="password">PASSWORD</label>
        <input type="number" placeholder="Enter strong password" id="password" name="password">
        <br><br>
        <label for="conf password">CONFIRMPASSWORD </label>
        <input type="number" id="conf password" name="conf password" required>
        <br><br>
        <label for="gmail">gmail</label>
        <input type="text" placeholder="abc@gmail.com" id="gmail" name="gmail">
        <br><br>
        <p><h3>This is an some Basicadvanced form tags in html</h3></p>
       <p> Select your gender</p>
        <input type="radio" id="name" name="gender">
        <label for="male">male</label>
        <input type="radio" id="female" name="gender">
        <label for="female">female</label>
        <input type="radio" id="other" name="gender">
        <label for="other">other</label>
        <br><br>
        <p>select your hoby</p>
        <input type="checkbox" id="coding" name="hoby">
        <label for="coding">coding</label>
        <input type="checkbox" id="Gaming" name="hoby">
        <label for="Gaming">Gaming</label>
        <input type="checkbox" id="Developer" name="hoby">
        <label for="Developer">Developer</label>
        <input type="checkbox" id="Other" name="hoby">
        <label for="Other">Other</label>
        <br><br>
        <label for="city">choose your city</label>
        <select id="city" name="city">
            <option value="Pune">Pune</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Nagpur">Nagpur</option>
            <option value="Bhopal">Bhopal</option>
        </select>
        <br><br>
        <label for="message">message</label>
        <textarea id="message" name="message"></textarea>
        <br><br>
        

        <input type="submit" value="submit">
       

    </form>
</body>

</html>
